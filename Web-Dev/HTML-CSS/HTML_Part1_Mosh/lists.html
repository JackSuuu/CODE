<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Lists</title>
    <style>
      ul {
        list-style-type: square;
      }
    </style>
  </head>
  <body>
    <ul>
      <li>About me</li>
      <li>
        Courses
        <ul>
          <li>HTML</li>
          <li>Javascript</li>
          <li>Git</li>
        </ul>
      </li>
      <li>Subscribe</li>
      <li>Contact me</li>
    </ul>
    <ol>
      <li>Preheat the oven</li>
      <li>Place the ingridents on the crust.</li>
      <li>Put the pizza in the oven for 20 mins</li>
    </ol>
    <dl>
      <dt>HTML</dt>
      <dd>Hypertext Markup Languag</dd>
      <dt>Css</dt>
      <dd>Cascading Stylesheet</dd>
    </dl>
  </body>
</html>
