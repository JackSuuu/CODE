<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Semantic element</title>
  </head>
  <body>
    <article class="article">
      <h1>Heading</h1>
      <p>Published <time datetime="2022-06-21 13:38">1 2022 13:37</time></p>
      <p>
        <mark>Lorem</mark> ipsum dolor sit amet consectetur adipisicing elit.
        Possimus harum assumenda, doloribus cum ipsum dolores labore fugit quis
        earum vero! Voluptatem veritatis temporibus hic excepturi quod, magnam
        ipsam vel iure.
      </p>
      <figure>
        <img src="images/coffee.jpg" alt="" />
        <figcaption>My coffee this morning</figcaption>
      </figure>
    </article>
  </body>
</html>
