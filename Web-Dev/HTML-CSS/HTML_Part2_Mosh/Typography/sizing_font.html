<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sizing fonts</title>
    <style>
      html {
        font-size: 100%;
      }
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        font-size: 1rem;
      }
      h1,
      h2,
      h3,
      h4,
      h5,
      h6 {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }
      h1 {
        font-size: 4.209rem;
      }
      h2 {
        font-size: 3.157rem;
      }
      @media screen and (min-width: 600px) {
        html {
          font-size: 130%;
        }
      }
    </style>
  </head>
  <body>
    <h1>Heading 1</h1>
    <h2>Heading 2</h2>
    <p>
      Lorem ipsum dolor, sit amet consectetur adipisicing elit. Similique
      temporibus ut eos minus voluptatibus amet adipisci placeat totam
      necessitatibus incidunt, nostrum vero, iure est libero porro optio a ipsa
      aliquid.
    </p>
  </body>
</html>
