<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Styling font</title>
    <style>
      @font-face {
        font-family: "opensans";
        src: url("Css/fonts/open_sans/opensans-regular-webfont.woff2")
            format("woff2"),
          url("Css/fonts/open_sans/opensans-regular-webfont.woff")
            format("woff");
        font-weight: normal;
        font-style: normal;
        font-display: fallback;
      }

      @font-face {
        font-family: "open_sansbold";
        src: url("Css/fonts/open_sans/opensans-bold-webfont.woff2")
            format("woff2"),
          url("Css/fonts/open_sans/opensans-bold-webfont.woff") format("woff");
        font-weight: bold;
        font-style: normal;
      }
      body {
        font-family: "opensans", Arial, Helvetica, sans-serif;
      }
      h1 {
        font-family: Georgia, "Times New Roman", Times, serif;
      }
      p {
        font-weight: normal;
        font-style: normal;
        font-size: 1rem;
        color: #222;
      }
    </style>
  </head>
  <body>
    <h1>Heading</h1>
    <p>
      Lorem ipsum dolor, sit amet consectetur adipisicing elit. Odit dolor totam
      exercitationem. Dolorum rerum pariatur magnam reiciendis enim quia fugiat
      reprehenderit eaque recusandae consequuntur laborum magni natus debitis,
      asperiores doloremque.
    </p>
    <a href="#">Link</a>
  </body>
</html>
