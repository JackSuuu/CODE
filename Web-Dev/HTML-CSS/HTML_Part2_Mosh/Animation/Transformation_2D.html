<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Transformation 2D</title>
    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      .box {
        width: 100px;
        height: 100px;
        background: gold;
      }
      .box:hover {
        transform: rotate(15deg) scale(1.5) skew(15deg) translate(10px, 10px);
      }
    </style>
  </head>
  <body>
    <div class="box">Lorem ipsum dolor sit amet consectetur</div>
  </body>
</html>
