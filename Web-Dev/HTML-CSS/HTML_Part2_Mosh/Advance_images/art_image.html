<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Art direction</title>
    <style>
      .pic {
        width: 400px;
      }
    </style>
  </head>
  <body>
    <picture>
      <source
        media="(max-width: 500px)"
        srcset="images/coffee.jpg"
        class="pic"
      />
      <source media="(max-width: 501px)" srcset="images/line.jpg" class="pic" />
      <img src="images/coffee.jpg" alt="" class="pic" />
    </picture>
  </body>
</html>
