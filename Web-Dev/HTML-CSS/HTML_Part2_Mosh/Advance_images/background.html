<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>content images</title>
    <style>
      body {
        background: url(images/bg-gradient.jpg);
        background-repeat: no-repeat;
        background-position: 0 0;
        background-size: cover;
        height: 300vh;
        background-attachment: scroll;
      }
      .meal {
        width: 500px;
        position: absolute;
      }
    </style>
  </head>
  <body>
    <div>
      <h1 style="color: white">Delicious meal</h1>
      <img
        class="meal"
        src="images/meal.jpg"
        alt="top view of a bunch of delicious meal"
      />
    </div>
  </body>
</html>
