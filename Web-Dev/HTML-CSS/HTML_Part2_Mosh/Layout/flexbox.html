<!DOCTYPE html>
<html lang="en">
  <head>
    <title>flexbox</title>
    <style>
      .container {
        border: 3px solid lightcyan;
        display: flex;
        flex-direction: row;
        justify-content: center;
        align-items: center;
        flex-wrap: wrap;
        align-content: center;
        height: 90vh;
      }
      .box {
        flex-basis: 5rem;
        flex-grow: 1;
        width: 5rem;
        height: 5rem;
        background: cyan;
        margin: 1rem;
      }
      .box-one {
        flex-basis: 5rem;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="box box-one">A</div>
      <div class="box">B</div>
      <div class="box">C</div>
      <div class="box">D</div>
      <div class="box">E</div>
      <div class="box">F</div>
      <div class="box">G</div>
      <div class="box">H</div>
    </div>
  </body>
</html>
