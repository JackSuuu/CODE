<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Relative</title>
    <style>
      body {
        font-size: 62.5%;
        margin: 10px;
      }
      .box {
        /* 50% of the width of the parent */
        width: 50rem;
        height: 100vh;
        background-color: gold;
        border-top: 3px solid orange;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <p>
        Lorem ipsum dolor, sit amet consectetur adipisicing elit. Dolor fuga
        totam facere necessitatibus maxime inventore iste nostrum nulla sequi.
        Et, laudantium! Adipisci eum nemo nesciunt ipsum est consequuntur,
        cumque laudantium.
      </p>
    </div>
  </body>
</html>
