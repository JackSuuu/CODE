<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>addEventListener</title>
    <style>
        body {
            font-family:'Times New Roman', Times, serif;
        }

        #myBtn {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

        }
    </style>
</head>
<body>
    <h2>JavaScript addEventListener()</h2>

    <p>This example uses the addEventListener() method to execute a function when a user clicks on a button.</p>

    <button id="myBtn">Try</button>

    <script>
        function myFunction() {
            alert ("Hello World!");
        }

        const mySecondFunction = () => alert("Hello again");

        btn = document.getElementById("myBtn")

        btn.addEventListener("click", myFunction);
        btn.addEventListener("click", mySecondFunction);
    </script>

</body>
</html>
